server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — Angular router (path-based) resolves deep links client-side.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API surfaces to the backend service (docker_targets label "backend", port 3000).
  location /trpc/ {
    proxy_pass http://backend:3000/trpc/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /health {
    proxy_pass http://backend:3000/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Crawler documents are served dynamically by the backend (published posts
  # drive sitemap lastmod) and must resolve at the site root, not under /api.
  location = /sitemap.xml {
    proxy_pass http://backend:3000/sitemap.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location = /robots.txt {
    proxy_pass http://backend:3000/robots.txt;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }
}
