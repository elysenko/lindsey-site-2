apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lindsey-site-2-staging
  namespace: colossus-apps-staging
  labels:
    app: lindsey-site-2-staging
    managed-by: colossus
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: ubuntu.desmana-truck.ts.net
      http:
        paths:
          - path: /lindsey-site-2-staging(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: lindsey-site-2-staging
                port:
                  number: 80
  tls:
    - hosts:
        - ubuntu.desmana-truck.ts.net
      secretName: colossus-shared-tls
